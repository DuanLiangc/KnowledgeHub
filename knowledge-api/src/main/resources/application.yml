spring:
  config:
    import: optional:file:./application-local.yml
  application:
    name: knowledge-hub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/knowledge_hub}
    username: ${DB_USERNAME:knowledge_hub}
    password: ${DB_PASSWORD:knowledge_hub_local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

knowledge-hub:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-5.6-luna}
      connect-timeout: 10s
      request-timeout: 120s
      max-output-tokens: 1024

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
